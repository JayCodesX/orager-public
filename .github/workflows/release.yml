name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create a GitHub Release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries (all targets)
        run: node scripts/build-binary.mjs --targets=bun-darwin-arm64,bun-darwin-x64,bun-linux-x64

      - name: List produced binaries
        run: ls -lh bin/

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## Binaries

            | File | Platform |
            |------|----------|
            | `orager-darwin-arm64` | macOS Apple Silicon |
            | `orager-darwin-x64` | macOS Intel |
            | `orager-linux-x64` | Linux x86-64 |
            | `orager-mcp-darwin-arm64` | MCP server — macOS Apple Silicon |
            | `orager-mcp-darwin-x64` | MCP server — macOS Intel |
            | `orager-mcp-linux-x64` | MCP server — Linux x86-64 |

            Download the binary for your platform, make it executable (`chmod +x`), and place it in your `$PATH`.
          files: |
            bin/orager-darwin-arm64
            bin/orager-darwin-x64
            bin/orager-linux-x64
            bin/orager-mcp-darwin-arm64
            bin/orager-mcp-darwin-x64
            bin/orager-mcp-linux-x64
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
