version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Group minor/patch updates to reduce PR noise
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      opentelemetry:
        patterns:
          - "@opentelemetry/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
